name: Lint Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml

      - name: Run contract linter
        run: python3 tools/lint_contracts.py

      - name: Run unit tests
        run: python3 -m unittest tools.test_linter

      - name: Run smoke tests
        run: python3 tools/smoke_test.py
