module: notifications
version: 1
conventions_version: 2
status: draft
type: regular

purpose: "Push notifications, emails, and in-app alerts"

provides:
  - id: send_notification
    input: { user_id: uuid, channel: enum(push|email|in_app), title: string, body: string }
    output: { notification_id: uuid, sent_at: timestamp }
    errors: [USER_NOT_FOUND, CHANNEL_DISABLED, SEND_FAILED]
    invariants:
      - "respects user notification preferences"

  - id: get_notifications
    input: { user_id: uuid, unread_only: boolean, limit: integer }
    output: { notifications: "Notification[]", unread_count: integer }
    errors: [UNAUTHORIZED]
    invariants:
      - "returns in_app only, ordered by created_at desc"

  - id: mark_read
    input: { user_id: uuid, notification_ids: "uuid[]" }
    output: { updated_count: integer }
    errors: [UNAUTHORIZED]
    invariants:
      - "silently skips already-read or missing IDs"

  - id: set_preferences
    input: { user_id: uuid, push_enabled: boolean, email_enabled: boolean }
    output: { success: boolean }
    errors: [UNAUTHORIZED]
    invariants:
      - "preferences take effect immediately"

consumes:
  - module: user-auth
    interface: verify_token
    required: true
    contract_version: 1
  - module: todo-api
    interface: complete_todo
    required: false
    contract_version: 1
    via: BUS

contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
