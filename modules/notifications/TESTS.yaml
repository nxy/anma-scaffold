module: notifications
tests:
  - interface: send_notification
    case: valid_push
    input: { user_id: "uuid-1", channel: "push", title: "Task done", body: "Your todo was completed" }
    expect: { has_keys: [notification_id, sent_at] }

  - interface: send_notification
    case: channel_disabled
    input: { user_id: "uuid-2", channel: "email", title: "Update", body: "Hello" }
    expect: { error: CHANNEL_DISABLED }

  - interface: get_notifications
    case: unread_only
    input: { user_id: "uuid-1", unread_only: true, limit: 20 }
    expect: { has_keys: [notifications, unread_count] }

  - interface: mark_read
    case: valid_mark
    input: { user_id: "uuid-1", notification_ids: ["uuid-n1", "uuid-n2"] }
    expect: { has_keys: [updated_count] }

  - interface: set_preferences
    case: valid_preferences
    input: { user_id: "uuid-1", push_enabled: true, email_enabled: false }
    expect: { has_keys: [success] }
