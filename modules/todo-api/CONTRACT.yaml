module: todo-api
version: 1
conventions_version: 2
status: draft
type: regular

purpose: "CRUD for todo items with ownership, tags, and completion"

provides:
  - id: create_todo
    input: { user_id: uuid, title: string, tags: "string[]" }
    output: { todo_id: uuid, created_at: timestamp }
    errors: [UNAUTHORIZED, INVALID_TITLE]
    invariants:
      - "title 1-200 chars, max 5 tags"

  - id: get_todos
    input: { user_id: uuid, status: enum(all|active|completed), limit: integer }
    output: { todos: "Todo[]", total: integer }
    errors: [UNAUTHORIZED]
    invariants:
      - "returns only todos owned by user_id"

  - id: update_todo
    input: { user_id: uuid, todo_id: uuid, title: string_nullable, tags: "string[]_nullable" }
    output: { todo_id: uuid, updated_at: timestamp }
    errors: [UNAUTHORIZED, TODO_NOT_FOUND]
    invariants:
      - "null fields are not modified"

  - id: complete_todo
    input: { user_id: uuid, todo_id: uuid }
    output: { todo_id: uuid, completed_at: timestamp }
    errors: [UNAUTHORIZED, TODO_NOT_FOUND, ALREADY_COMPLETED]
    invariants:
      - "irreversible, publishes BUS event"

  - id: delete_todo
    input: { user_id: uuid, todo_id: uuid }
    output: { success: boolean }
    errors: [UNAUTHORIZED, TODO_NOT_FOUND]
    invariants:
      - "hard delete, only owner can delete"

consumes:
  - module: user-auth
    interface: verify_token
    required: true
    contract_version: 1

contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
