module: user-auth
version: 1
status: draft
type: regular

purpose: "User registration, login, session management, and password reset"

provides:
  - id: register
    input: { email: string, password: string, display_name: string }
    output: { user_id: uuid, token: string }
    errors: [EMAIL_TAKEN, WEAK_PASSWORD, INVALID_EMAIL, RATE_LIMITED]
    invariants:
      - "auto-sends verification email; unverified accounts have limited access"
      - "passwords hashed with bcrypt, min 8 characters"

  - id: login
    input: { email: string, password: string }
    output: { user_id: uuid, token: string }
    errors: [INVALID_CREDENTIALS, ACCOUNT_LOCKED, RATE_LIMITED]
    invariants:
      - "INVALID_CREDENTIALS returned for both wrong password and non-existent email"
      - "account locked after 5 consecutive failures"

  - id: verify_token
    input: { token: string }
    output: { user_id: uuid, email: string, email_verified: boolean }
    errors: [TOKEN_EXPIRED, INVALID_TOKEN]
    invariants:
      - "primary interface for all modules to verify user identity"

  - id: reset_password
    input: { email: string }
    output: { success: boolean }
    errors: [INVALID_EMAIL, RATE_LIMITED]
    invariants:
      - "succeeds silently for non-existent emails to prevent enumeration"

  - id: delete_account
    input: { user_id: uuid }
    output: { success: boolean }
    errors: []
    invariants:
      - "immediately revokes all sessions"
      - "publishes BUS deletion event for async module cleanup"

consumes: []

contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
