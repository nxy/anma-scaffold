module: user-auth
version: 1
conventions_version: 2
status: draft
type: regular

purpose: "Registration, login, sessions, and password reset"

provides:
  - id: register
    input: { email: string, password: string, display_name: string }
    output: { user_id: uuid, token: string }
    errors: [EMAIL_TAKEN, WEAK_PASSWORD, INVALID_EMAIL]
    invariants:
      - "auto-sends verification email"
      - "password must be at least 8 characters"

  - id: login
    input: { email: string, password: string }
    output: { user_id: uuid, token: string }
    errors: [INVALID_CREDENTIALS, ACCOUNT_LOCKED]
    invariants:
      - "same error for wrong password and non-existent email"

  - id: verify_token
    input: { token: string }
    output: { user_id: uuid, email: string, email_verified: boolean }
    errors: [TOKEN_EXPIRED, INVALID_TOKEN]
    invariants:
      - "primary identity check for all modules"

  - id: reset_password
    input: { email: string }
    output: { success: boolean }
    errors: [INVALID_EMAIL]
    invariants:
      - "succeeds silently for non-existent emails"

  - id: delete_account
    input: { user_id: uuid }
    output: { success: boolean }
    errors: []
    invariants:
      - "revokes all sessions, publishes BUS deletion event"

consumes: []

contract_rules:
  adding_interface: allowed
  modifying_interface: notify
  removing_interface: breaking
